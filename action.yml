name: "Install MicroPython"
description: "Build and install MicroPython"
author: "Brian Pugh <bnp117@gmail.com>"
branding:
  icon: "package"
  color: "green"
inputs:
  repository:
    description: "Micropython Git Repository"
    required: false
    default: "https://github.com/micropython/micropython"
  reference:
    description: "Specific branch, tag, or commit SHA to checkout"
    required: false
  cflags:
    description: "Extra cflags to pass to micropython at compile-time."
    required: false
outputs:
  cache-hit:
    description: "Whether the binaries were restored from cache ('true'/'false')."
  sha:
    description: "The resolved MicroPython commit SHA that was installed."
runs:
  using: "node20"
  main: "dist/index.js"
