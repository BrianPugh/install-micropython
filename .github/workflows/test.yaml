name: Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # A tag (shallow clone), a branch (full clone), and the default branch
        mpy-reference: ["v1.22.1", "master", ""]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm test

      - name: Build and Install MicroPython Unix Port
        id: install
        uses: ./
        with:
          reference: ${{ matrix.mpy-reference }}

      - name: Verify mpy-cross Installation
        run: mpy-cross --version

      - name: Verify Micropython Installation
        run: micropython tools/print_version.py

      - name: Verify sha output
        run: |
          echo "Resolved SHA: ${{ steps.install.outputs.sha }}"

          if [ -z "${{ steps.install.outputs.sha }}" ]; then
            echo "The sha output is empty."
            exit 1
          fi

      - name: Verify MPY_DIR
        run: |
          echo "MPY_DIR is set to $MPY_DIR"

          if [ -d "$MPY_DIR" ]; then
            echo "The directory $MPY_DIR exists."
          else
            echo "The directory $MPY_DIR does not exist."
            exit 1
          fi

  test-cache:
    # Re-run with the same pinned reference as the test job to exercise the
    # cache-restore path, with and without submodule initialization.
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        submodules: ["true", "false"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build and Install MicroPython Unix Port
        id: install
        uses: ./
        with:
          reference: "v1.22.1"
          submodules: ${{ matrix.submodules }}

      - name: Verify cache was used
        run: |
          if [ "${{ steps.install.outputs.cache-hit }}" != "true" ]; then
            echo "Expected a cache hit, got '${{ steps.install.outputs.cache-hit }}'."
            exit 1
          fi

      - name: Verify submodules handling
        run: |
          cd "$MPY_DIR"
          initialized=$(git submodule status | grep -c '^[^-]' || true)
          echo "Initialized submodules: $initialized"

          if [ "${{ matrix.submodules }}" = "true" ] && [ "$initialized" -eq 0 ]; then
            echo "Expected submodules to be initialized."
            exit 1
          fi
          if [ "${{ matrix.submodules }}" = "false" ] && [ "$initialized" -ne 0 ]; then
            echo "Expected submodule initialization to be skipped."
            exit 1
          fi

      - name: Verify mpy-cross Installation
        run: mpy-cross --version

      - name: Verify Micropython Installation
        run: micropython tools/print_version.py

  test-cflags:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build and Install MicroPython Unix Port
        uses: ./
        with:
          reference: "v1.22.1"
          cflags: "-DMICROPY_MEM_STATS=1"

      - name: Verify cflags were applied
        # micropython.mem_total() only exists when built with MICROPY_MEM_STATS
        run: micropython -c "import micropython; print(micropython.mem_total())"
